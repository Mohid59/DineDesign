services:
  # ── Backend (Express) ──────────────────────────────────────────────
  - type: web
    name: dinedesign-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_TENANT_ID
        value: default-tenant
      - key: ADMIN_CREDENTIALS
        sync: false          # Set this manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_API_KEY
        sync: false          # Set this manually in Render dashboard

  # ── Frontend (React/Vite static site) ─────────────────────────────
  - type: web
    name: dinedesign-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your backend Render URL, e.g. https://dinedesign-backend.onrender.com
      - key: VITE_TENANT_ID
        value: default-tenant
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
